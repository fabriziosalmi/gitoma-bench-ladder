[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "gitoma-bench-rung-3"
version = "0.0.1"
description = "Rung 3 of the gitoma bench ladder — Python + SQLite, SQL-injection bug."
requires-python = ">=3.10"

[tool.pytest.ini_options]
pythonpath = [""]
testpaths = ["tests"]

[tool.mypy]
ignore_missing_imports = true
warn_redundant_casts = true
strict = true
explicit_package_level_contracts = true
plugins = [
    "mypy_extensions",
]

[tool.mypy.overrides]
# Add mypy dependency configuration here if needed, or just ensure it's in dependencies
# Since the request is to install dependency, we assume it should be added to project dependencies.
dependencies = [
    "mypy",
]
