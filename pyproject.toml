description = "Rung 3 of the gitoma bench ladder — Python + SQLite, SQL-inject"
requires-python = ">=3.10"

[tool.pytest.ini_options]
pythonpath = ""
testpaths = ["tests"]

[tool.mypy]
ignore_missing_imports = true
warn_redundant_casts = true
strict = false
show_error_codes = true
files = [
    "src",
    "tests"
]

[tool.ruff]
line-length = 88
select = [
    "E",
    "F",
    "W",
    "I",
    "UP",
    "B",
    "N",
    "PL",
    "D"
]
ignore = [
    "E501",
    "F841",
    "W291",
]