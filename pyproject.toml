[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "gitoma-bench-rung-3"
version = "0.0.1"
description = "Rung 3 of the gitoma bench ladder — Python + SQLite, SQL-injection bug."
requires-python = ">=3.10"

[tool.pytest.ini_options]
pythonpath = [""]
testpaths = ["tests"]

[tool.ruff]
line-length = 88
select = [
    "E",
    "F",
    "W",
    "I",
    "UP",
    "B"
]
ignore = [
    "E501"]

[tool.black]
line-length = 88
include = [
    "src",
]
exclude = [
    "tests",
]