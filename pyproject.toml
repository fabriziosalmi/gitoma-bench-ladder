[build-system]
requires = ["setuptools>=61"]
build_backend = "setuptools.build_meta"

[project]
name = "gitoma-bench-rung-0"
version = "0.0.1"
description = "Rung 0 of the gitoma bench ladder — single file, single bug."
requires-python = ">=3.10"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.mypy]
ignore_missing_imports = true
explicit_package_roots = true
plugins = [
    "mypy_extensions"
]
