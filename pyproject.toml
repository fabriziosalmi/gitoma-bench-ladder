[build-system]
requires = ["setuptools>=61"]
build_backend = "setuptools.build_meta"

[project]
name = "gitoma-bench-rung-3"
version = "0.0.1"
description = "Rung 3 of the gitoma bench ladder — Python + SQLite, SQL-injection bug."
requires-python = ">=3.10"

[tool.pytest.ini_options]
pythonpath = [""]
testpaths = ["tests"]

[tool.ruff]
line-length = 88
select = [
    "E",
    "F",
    "W"
]
ignore = [
    "E501"
]

[tool.mypy]
ignore_missing_imports = true
warn_unused_ignores = true
strict = false
extend_parents = false
files = [
    "src",
    "tests"
]
plugins = []

[tool.poetry.dependencies]
python = "^3.10"

[tool.poetry.group.dev.dependencies]
pytest = "^7.0"
ruff = "^0.1.0"
mypy = "^1.0"
