name: Build & publish bench site

# Rebuild + redeploy the static bench site whenever a scorecard lands
# on main, or whenever the build script itself changes.
on:
  push:
    branches: [main]
    paths:
      - "bench/results/**"
      - "bench/build_site.py"
      - ".github/workflows/bench-pages.yml"
  workflow_dispatch:

# GitHub Pages wants this exact triple of permissions for the
# actions/deploy-pages@v4 flow (the modern "GitHub Actions" source,
# NOT the legacy "deploy from branch" source — the repo setting must
# be "Build and deployment: Source = GitHub Actions").
permissions:
  contents: read
  pages: write
  id-token: write

# Only one build at a time; if a new push lands while a build is
# running, queue it but do not cancel the in-flight one (we don't
# want a half-deployed site).
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build bench site
        run: python bench/build_site.py docs/

      - name: Show artifact contents (debug)
        run: ls -la docs/ && head -c 2000 docs/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
